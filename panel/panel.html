<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Token Glass</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>

<header>
  <div class="header-brand">
    <h1>Token Glass</h1>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="decode">Decode</button>
    <button class="tab-btn" data-tab="captured">
      Captured
      <span class="tab-badge" id="capturedBadge">0</span>
    </button>
  </div>
</header>

<div class="layout">
  <div id="capturedPanel">
    <div class="captured-header panel-label">
      Captured
      <div class="captured-header-actions">
        <button class="clear-btn" id="collapseAllBtn">Collapse all</button>
        <button class="clear-btn" id="clearCapturedBtn">Clear</button>
      </div>
    </div>
    <div class="token-list" id="tokenList">
      <div class="captured-empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Make network requests and JWTs will appear here automatically</p>
      </div>
    </div>
  </div>

  <div class="input-panel">
    <div class="primary-slot">
      <div class="panel-label">
        Token
        <div class="primary-slot-actions">
          <button class="clear-btn" id="clearBtn">Clear</button>
          <button class="clear-btn" id="compareToggleBtn">+ Compare</button>
        </div>
      </div>
      <div class="token-wrapper">
        <div id="tokenDisplay"><span class="placeholder">Paste your JWT here...</span></div>
        <textarea id="hiddenInput" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>
    <div class="compare-slot" id="compareSlot">
      <div class="panel-label">
        <div class="compare-slot-label-inner">
          <span class="diff-slot-badge diff-badge-a">A</span>
          <span class="compare-arrow">→</span>
          <span class="diff-slot-badge diff-badge-b">B</span>
          <span class="compare-slot-title">Compare with</span>
        </div>
        <button class="clear-btn" id="compareClearBtn">Clear</button>
      </div>
      <div class="token-wrapper">
        <div id="compareDisplay"><span class="placeholder">Paste second JWT…</span></div>
        <textarea id="compareInput" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="output-panel">
    <div class="panel-label output-header">
      <span>Decoded</span>
      <div class="search-bar" id="searchBar">
        <input id="searchInput" class="search-input" type="text" placeholder="Find in decoded" spellcheck="false" />
        <span id="searchCount" class="search-count">0/0</span>
        <button id="searchPrevBtn" class="search-btn" type="button" aria-label="Previous result">↑</button>
        <button id="searchNextBtn" class="search-btn" type="button" aria-label="Next result">↓</button>
        <button id="searchCloseBtn" class="search-btn" type="button" aria-label="Close search">✕</button>
      </div>
    </div>
    <div class="sections" id="output"></div>
  </div>
</div>

<footer class="app-footer">
  <span class="footer-name">Token Glass</span>
  <span class="footer-sep">·</span>
  <button class="footer-link" id="footerGithub">GitHub</button>
  <span class="footer-sep">·</span>
  <button class="footer-link" id="footerBug">Report an issue</button>
  <span class="footer-sep">·</span>
  <button class="footer-link" id="footerPrivacy">Privacy Policy</button>
</footer>

<script type="module" src="panel.js"></script>
</body>
</html>
